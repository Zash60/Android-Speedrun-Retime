# A human-readable name for the workflow, shown in the "Actions" tab
name: Manual Android Build

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # The "build" job
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Sets up the Java Development Kit (JDK) required for Android builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Cache Gradle dependencies to speed up future builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Grant execute permission to the gradlew script
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Step 5: Run the Gradle command to build the debug APK
      - name: Build debug APK with Gradle
        run: ./gradlew assembleDebug

      # Step 6: Rename the generated APK to something more descriptive
      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk Android-Speedrun-Retime.apk

      # Step 7: Upload the generated APK as a "build artifact"
      # This makes the APK available for download from the workflow run's page
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          # The name of the artifact to be uploaded
          name: Android-Speedrun-Retime-APK
          # The path to the file(s) to be uploaded
          path: Android-Speedrun-Retime.apk
          # How long to keep the artifact (in days)
          retention-days: 14
